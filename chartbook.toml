[config]
type = "pipeline"
chartbook_format_version = "0.0.2"

[site]
title = "Predictive Regressions: A Present-Value Approach"
author = "Moxiao Li & Yilun Cai"
copyright = "2025"
logo_path = ""
favicon_path = ""

[pipeline]
id = "PR"
pipeline_name = "Predictive Regressions: A Present-Value Approach"
pipeline_description = "Replication of van Binsbergen & Koijen (2010)"
lead_pipeline_developer = "Moxiao Li & Yilun Cai"
contributors = ["Moxiao Li & Yilun Cai"]
runs_on_grid_or_windows_or_other = "Windows/Linux/MacOS"
git_repo_URL = ""
README_file_path = "./README.md"

[notebooks]

[dataframes.replication_data]
data_sources = ["Replication"]
data_providers = ["Local"]
how_is_pulled = "Generated by replication scripts"
path_to_parquet_data = "_output/dividend_growth_stats_2024.csv"
dataframe_docs_str = "Dataset used in predictive regression replication."
date_col = "date"

# Figures
[charts.figure1_2007]
chart_name = "Figure 1 (Sample ending in 2007)"
short_description_chart = "Replication of Figure 1 using the original sample."
dataframe_id = "replication_data"
path_to_html_chart = "_output/figure1_2007.html"
chart_docs_str = "Replication of predictive regression figure using the original sample ending in 2007."

[charts.figure1_2024]
chart_name = "Figure 1 (Updated sample through 2024)"
short_description_chart = "Replication of Figure 1 with updated data."
dataframe_id = "replication_data"
path_to_html_chart = "_output/figure1_2024.html"
chart_docs_str = "Replication extended to updated sample through 2024."

# Documents
[files.data_report]
file_name = "Data Report"
file_description = "Summary statistics and diagnostics for replication data."
file_path = "reports/data_report.pdf"

[files.final_report]
file_name = "Replication Report"
file_description = "Final replication report comparing results with the original paper."
file_path = "reports/report.pdf"